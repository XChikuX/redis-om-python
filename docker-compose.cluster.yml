services:
    redis-cluster-7001:
        container_name: redis-cluster-7001
        image: "redis:8-alpine"
        restart: always
        # ``host.docker.internal`` resolves to the host's Docker port-mapping
        # gateway on Docker Desktop / WSL2. On Linux CI runners it does not
        # exist by default, so we add it via ``extra_hosts`` (the special
        # ``host-gateway`` keyword is expanded by Docker to the host IP).
        # Advertising this IP (rather than 127.0.0.1) lets cluster gossip
        # traffic route between containers via the published ports, which
        # works on both WSL2/Docker Desktop and plain Linux.
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "7001:7001"
            - "17001:17001"
        command: >
            redis-server
            --port 7001
            --dir /data
            --save ""
            --appendonly no
            --protected-mode no
            --cluster-enabled yes
            --cluster-config-file nodes-7001.conf
            --cluster-node-timeout 5000
            --cluster-announce-ip host.docker.internal
            --cluster-announce-port 7001
            --cluster-announce-bus-port 17001

