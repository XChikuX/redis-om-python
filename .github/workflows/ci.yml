name: CI

on:
    push:
        branches:
            - main
            - "[0-9].[0-9]+" # matches to backport branches, e.g. 3.6
        tags: ["v*"]
    pull_request:
        branches:
            - main
            - "[0-9].[0-9]+"
            - "update/pre-commit-autoupdate"
    schedule:
        - cron: "0 6 * * *" # Daily 6AM UTC build

env:
    pythonversion: 3.12

jobs:
    lint:
        name: Linter
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Setup Python 3.10+
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version: ${{env.pythonversion}}
            - name: Setup uv
              uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
              with:
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"
              #----------------------------------------------
              #       load cached venv if cache exists
              #----------------------------------------------
            - name: Load cached venv
              id: cached-venv
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: .venv
                  key: venv-${{ runner.os }}-${{ env.pythonversion }}-${{ hashFiles('uv.lock') }}
            - name: Make sync version of library (redis_om)
              run: make sync
              #----------------------------------------------
              # install dependencies if cache does not exist
              #----------------------------------------------
            - name: Install dependencies
              if: steps.cached-venv.outputs.cache-hit != 'true'
              run: uv sync --extra dev
              #----------------------------------------------
              # install your root project, if required
              #----------------------------------------------
            - name: Install library
              run: uv sync --extra dev
              #----------------------------------------------
              #              run test suite
              #----------------------------------------------
            - name: Run linter
              run: make lint
              env:
                  UV_PROJECT_ENVIRONMENT: .venv

    test-unix:
        name: Test Unix
        needs: lint
        strategy:
            matrix:
                os: [ubuntu-latest]
                pyver: ["3.10", "3.11", "3.12", "3.13", "3.14"]
            fail-fast: true
        services:
            redis:
                image: redis:8-alpine
                ports:
                    # Maps port 6379 on service container to the host
                    - 6379:6379
                # Set health checks to wait until redis has started
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        runs-on: ${{ matrix.os }}
        timeout-minutes: 15
        env:
            OS: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Setup Python ${{ matrix.pyver }}
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version: ${{ matrix.pyver }}
            - name: Setup uv
              uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
              with:
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"
              #----------------------------------------------
              #       load cached venv if cache exists
              #----------------------------------------------
            - name: Load cached venv
              id: cached-venv
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: .venv
                  key: venv-${{ runner.os }}-${{ matrix.pyver }}-${{ hashFiles('uv.lock') }}
              #----------------------------------------------
              # Make sync version of library (redis_om)
              #----------------------------------------------
            - name: Make sync version of library (redis_om)
              run: make sync
              #----------------------------------------------
              # install dependencies if cache does not exist
              #----------------------------------------------
            - name: Install dependencies
              if: steps.cached-venv.outputs.cache-hit != 'true'
              run: uv sync --extra dev
              #----------------------------------------------
              # install your root project, if required
              #----------------------------------------------
            - name: Install library
              run: uv sync --extra dev
            - name: Run unittests (redis:8-alpine, ${{ matrix.os }})
              env:
                  REDIS_OM_URL: "redis://localhost:6379?decode_responses=True"
              run: |
                  make test
                  uv run coverage xml
            - name: Upload coverage
              uses: codecov/codecov-action@a99c28d3f0da835de33ff2feb2e15691c7b9641f # v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  flags: unit
                  env_vars: OS
                  fail_ci_if_error: false

    test-cluster:
        name: Test Cluster
        needs: lint
        strategy:
            matrix:
                pyver: ["3.10", "3.11", "3.12", "3.13", "3.14"]
            fail-fast: false
        runs-on: ubuntu-latest
        timeout-minutes: 25
        env:
            REDIS_OM_URL: "redis://localhost:6380?decode_responses=True"
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Setup Python ${{ matrix.pyver }}
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version: ${{ matrix.pyver }}
            - name: Setup uv
              uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
              with:
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"
            - name: Load cached venv
              id: cached-venv
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: .venv
                  key: venv-${{ runner.os }}-${{ matrix.pyver }}-${{ hashFiles('uv.lock') }}
            - name: Install dependencies
              if: steps.cached-venv.outputs.cache-hit != 'true'
              run: uv sync --extra dev
            - name: Install library
              run: uv sync --extra dev
            - name: Make sync version of library (redis_om)
              run: make sync
            - name: Ensure host.docker.internal resolves on host
              # The cluster compose advertises host.docker.internal, which
              # is resolvable inside containers via extra_hosts/host-gateway.
              # On Linux runners the host itself needs the entry too, so
              # the test client can follow cluster MOVED/ASK redirects.
              run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts
            - name: Run cluster tests
              run: |
                  make test_cluster
                  uv run coverage xml
            - name: Upload coverage
              uses: codecov/codecov-action@a99c28d3f0da835de33ff2feb2e15691c7b9641f # v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  flags: cluster
                  env_vars: OS
                  fail_ci_if_error: false
